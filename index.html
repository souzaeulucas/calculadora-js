<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora</title>

  <!-- Conectando o CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Caixa principal da calculadora -->
  <div class="calculadora">

    <!-- Tela onde aparecem os números -->
    <input type="text" id="display" disabled>

    <!-- Botões -->
    <div class="botoes">
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button>÷</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button>×</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button>-</button>

      <button>C</button>
      <button>0</button>
      <button>=</button>
      <button>+</button>
    </div>

  </div>

  <!-- Conectando o JavaScript -->
  <script src="script.js"></script>

</body>
</html>
